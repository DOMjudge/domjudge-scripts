---
# These tasks configure the DOMjudge judgedaemon with chroot

- name: Create domjudge-run users
  user:
    name: "domjudge-run-{{ item }}"
    createhome: false
    home: /nonexistent
    group: nogroup
    shell: /bin/false
  loop: "{{ cpucore }}"

- name: Create domjudge-run group
  group:
    name: domjudge-run
    state: present

- name: Remove temp package directory
  file:
    path: /tmp/dj_ansible
    state: absent

- name: Create temp package directory
  file:
    path: /tmp/dj_ansible
    state: directory
    owner: root
    group: root
    mode: 0700

- name: Copy chroot DEB packages to install
  synchronize:
    src: install-chroot
    dest: /tmp/dj_ansible/

- name: Copy chroot-list to install
  synchronize:
    src: chroot-list
    dest: /tmp/dj_ansible/

- name: Convert ASC key to GPG format for debootstrap
  shell: gpg --dearmor < /etc/apt/trusted.gpg.d/pc2packages.asc > /tmp/pc2packages.gpg
  args:
    creates: /tmp/pc2packages.gpg
  when: ICPC_IMAGE

- name: Check if chroot exists
  stat:
    path: /chroot/domjudge
  register: chroot_stat

- name: Create chroot
  when: not chroot_stat.stat.exists
  block:
    - name: Temporarily hide unwanted apt sources from host
      shell: |
        for f in /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list \
                 /etc/apt/sources.list.d/ppa_mozillateam_ppa_noble.list \
                 /etc/apt/sources.list.d/vscode.sources; do
          [ -f "$f" ] && mv "$f" "$f.disabled"
        done
      args:
        executable: /bin/bash

    - name: Run dj_make_chroot
      shell: "set -o pipefail &&
              {{ DJ_DIR }}/misc-tools/dj_make_chroot -y -H
                -i openjdk-21-jdk-headless,gcc-14,g++-14,python3 -k /tmp/pc2packages.gpg
                -l \"$(ls /tmp/dj_ansible/install-chroot/*.deb 2>/dev/null | tr '\n' ',')\"
                -s \"$(ls /tmp/dj_ansible/chroot-list/*.list 2>/dev/null | tr '\n' ',')\"
                2>&1 | tee /tmp/dj_make_chroot.log;
              grep '^Done building chroot in' /tmp/dj_make_chroot.log"
      environment: "{{ {'DEBMIRROR': chroot_debmirror} if chroot_debmirror else {} }}"
      vars:
        chroot_debmirror: "{% if WF_RESTRICTED_NETWORK and ICPC_IMAGE %}https://packages/ubuntu/noble{% elif ICPC_IMAGE %}https://sysopspackages.icpc.global/ubuntu/noble{% endif %}"
      args:
        executable: /bin/bash

    - name: Restore hidden apt sources on host
      shell: |
        for f in /etc/apt/sources.list.d/*.disabled; do
          [ -f "$f" ] && mv "$f" "${f%.disabled}"
        done
      args:
        executable: /bin/bash

- name: Set GCC/G++ 14 as default in chroot
  shell: |
    chroot /chroot/domjudge /usr/bin/update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
    chroot /chroot/domjudge /usr/bin/update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

- name: ICPC Kotlin setup in chroot
  when: ICPC_IMAGE
  block:
    - name: Sync kotlinc to chroot
      ansible.posix.synchronize:
        src: /opt/kotlinc/
        dest: /chroot/domjudge/usr/lib/kotlinc/
      delegate_to: "{{ inventory_hostname }}"

    - name: Create kotlin symlinks in chroot
      ansible.builtin.file:
        src: /usr/lib/kotlinc/bin/{{ item }}
        dest: /chroot/domjudge/usr/local/bin/{{ item }}
        state: link
        force: true
        follow: false
      loop:
        - kotlin
        - kotlinc

- name: ICPC pypy3 in setup in chroot
  when: ICPC_IMAGE
  block:
    - name: Sync pypy3 to chroot
      ansible.posix.synchronize:
        src: /opt/pypy3.11-v7.3.18-linux64/
        dest: /chroot/domjudge/usr/lib/pypy3/
      delegate_to: "{{ inventory_hostname }}"

    - name: Create pypy3 symlinks in chroot
      ansible.builtin.file:
        src: /usr/lib/pypy3/bin/{{ item }}
        dest: /chroot/domjudge/usr/local/bin/{{ item }}
        state: link
        force: true
        follow: false
      loop:
        - pypy3

- name: Kotlin setup in chroot
  when: not ICPC_IMAGE
  block:
    - name: Download and extract Kotlin compiler to chroot
      ansible.builtin.unarchive:
        src: https://github.com/JetBrains/kotlin/releases/download/v2.2.0/kotlin-compiler-2.2.0.zip
        dest: /chroot/domjudge/usr/lib/
        remote_src: true

    - name: Create kotlin symlinks in chroot
      ansible.builtin.file:
        src: /usr/lib/kotlinc/bin/{{ item }}
        dest: /chroot/domjudge/usr/local/bin/{{ item }}
        state: link
        force: true
        follow: false
      loop:
        - kapt
        - kotlin
        - kotlinc
        - kotlinc-js
        - kotlinc-jvm

- name: Pre-generate the kernel flags for ansible usage
  set_fact:
    procline: "apparmor=0 cgroup_enable=memory swapaccount=1 isolcpus={{ cpucore | join(',') }}"

- name: Add cgroup kernel parameters
  lineinfile:
    dest: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: "GRUB_CMDLINE_LINUX_DEFAULT=\"{{ procline }}\""

- name: Pre-generate the kernel flags for ansible usage (specific AWS)
  # AWS machines overwrite the variable from the last step in another file
  # console: https://tldp.org/HOWTO/Remote-Serial-Console-HOWTO/configure-kernel.html
  # nvme_core: https://docs.aws.amazon.com/ebs/latest/userguide/nvme-ebs-volumes.html#timeout-nvme-ebs-volumes
  when: AWS
  set_fact:
    procline_aws: "console=tty1 console=ttyS0 nvme_core.io_timeout=4294967295 {{ procline }}"

- name: Add cgroup kernel parameters for AWS machines
  when: AWS
  lineinfile:
    dest: /etc/default/grub.d/50-cloudimg-settings.cfg
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: "GRUB_CMDLINE_LINUX_DEFAULT=\"{{ procline_aws }}\""

- name: Check cgroup kernel parameters
  command: cat /proc/cmdline
  register: kernel_cmdline
  changed_when: procline not in kernel_cmdline.stdout
  notify:
    - Update grub
    - Reboot

- name: Reboot to activate kernel parameters
  meta: flush_handlers

- name: Copy script to disable turboboost and hyperthreading
  copy:
    src: disable-turboboost_ht
    dest: /usr/local/sbin/
    mode: 0755

- name: Copy tune_cpu systemd unit file
  copy:
    src: tune_cpu.service
    dest: /etc/systemd/system/
    mode: 0644
    group: root
    owner: root
  notify:
    - Enable and restart tune_cpu

- name: Enable and restart tune_cpu (flushing as this should always happen even if we fail further)
  # We need a daemon-reload, so we loose idempotency if we start the service in the next block
  ansible.builtin.meta: flush_handlers

- name: Copy judgedaemon related systemd unit files
  copy:
    remote_src: true
    src: "{{ DJ_DIR }}/lib/judge/{{ item }}.service"
    dest: /etc/systemd/system/
    mode: 0644
    group: root
    owner: root
  loop:
    - create-cgroups
    - domjudge-judgedaemon@
  notify:
    - Enable and restart create-cgroups

- name: Template judgedaemon template systemd unit file
  template:
    src: domjudge-judgehost.target.j2
    dest: /etc/systemd/system/domjudge-judgehost.target
    mode: 0644
    group: root
    owner: root
  notify:
    - Enable and restart judgedaemon

- name: Disable systemd timers
  systemd:
    name: "{{ item }}"
    masked: true
  loop:
    - apt-daily-upgrade.timer
    - apt-daily.timer
    - systemd-tmpfiles-clean.timer

- name: Enable and start judgedaemon
  service:
    name: "domjudge-judgehost.target"
    enabled: true
    state: started
    daemon_reload: true
